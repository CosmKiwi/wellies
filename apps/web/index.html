<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Wellies | Audit</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/maplibre-gl@^4.0.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            background: #020617;
            overflow: hidden;
        }

        #map {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #deck-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #year-min {
            z-index: 3;
        }

        #year-max {
            z-index: 4;
        }

        .min-on-top {
            z-index: 5 !important;
        }
    </style>
</head>

<body>
    <div id="map"></div>

    <canvas id="deck-canvas"></canvas>

    <div
        class="absolute top-6 left-6 z-[10] w-80 p-6 bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase">Wellies</h1>

        <div class="mt-4 flex p-1 bg-slate-950/50 rounded-xl border border-slate-800">
            <button id="tab-drinking"
                class="utility-tab flex-1 py-2 text-[10px] font-bold uppercase tracking-widest rounded-lg bg-blue-600 text-white transition-all">Drinking</button>
            <button id="tab-waste"
                class="utility-tab flex-1 py-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-200 transition-all rounded-lg">Waste</button>
            <button id="tab-storm"
                class="utility-tab flex-1 py-2 text-[10px] font-bold uppercase tracking-widest text-slate-400 hover:text-slate-200 transition-all rounded-lg">Storm</button>
        </div>

        <div class="mt-6 space-y-3">
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400">
                <span>Install Range</span>
                <span id="year-label" class="text-blue-400">1870 - 2026</span>
            </div>

            <div class="relative w-full h-6 flex items-center">
                <div class="absolute w-full h-1.5 bg-slate-800 rounded-lg"></div>
                <input type="range" id="year-min" min="1870" max="2026" value="1870"
                    class="absolute w-full appearance-none bg-transparent pointer-events-none z-30 [&::-webkit-slider-thumb]:pointer-events-auto [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:bg-blue-500 [&::-webkit-slider-thumb]:rounded-full">
                <input type="range" id="year-max" min="1870" max="2026" value="2026"
                    class="absolute w-full appearance-none bg-transparent pointer-events-none z-30 [&::-webkit-slider-thumb]:pointer-events-auto [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:h-4 [&::-webkit-slider-thumb]:bg-blue-400 [&::-webkit-slider-thumb]:rounded-full">
            </div>
        </div>

        <div class="mt-4 flex items-center justify-between">
            <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Include Unknown</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="toggle-unknown" checked class="sr-only peer">
                <div
                    class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all">
                </div>
            </label>
        </div>

        <div class="mt-4">
            <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Age Profile</span>
            <div id="histogram-container"
                class="w-full h-10 mt-1 pointer-events-none opacity-80 overflow-hidden rounded-b-lg">
                <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="w-full h-full">
                    <path id="hist-bg" d="" fill="rgba(51, 65, 85, 0.3)" />
                    <path id="hist-fg" d="" fill="rgba(59, 130, 246, 0.5)" stroke="#3b82f6" stroke-width="0.5"
                        vector-effect="non-scaling-stroke" />
                </svg>
            </div>
        </div>

        <div id="audit-stat"
            class="mt-6 p-3 bg-black/40 rounded-xl border border-white/5 text-sm font-mono text-slate-300 text-center">
            --
        </div>

        <div class="mt-4 space-y-2">
            <div class="flex justify-between text-xs font-bold uppercase tracking-widest text-slate-400">
                <span>Color Overlay</span>
            </div>
            <select id="color-mode"
                class="w-full bg-slate-800 text-slate-200 text-xs p-2.5 rounded-xl border border-slate-700 outline-none focus:border-blue-500 appearance-none cursor-pointer">
                <option value="default">Standard Blue</option>
                <option value="age">Asset Age (Heatmap)</option>
                <option value="material">Material Class</option>
            </select>
        </div>

        <div class="mt-4 flex items-center justify-between">
            <span class="text-xs font-bold uppercase tracking-widest text-slate-400">Include Leaks</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="toggle-leaks" checked class="sr-only peer">
                <div
                    class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-blue-600 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all">
                </div>
            </label>
        </div>
    </div>

    <script type="module" src="./main.ts"></script>
</body>

</html>
